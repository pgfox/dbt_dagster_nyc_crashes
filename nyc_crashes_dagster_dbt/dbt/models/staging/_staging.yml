version: 2

models:
  - name: stg_crashes
    description: Staged crash records with typed columns and renamed numeric fields
    columns:
      - name: collision_id
        description: Primary key
        tests:
          - not_null
          - unique

      - name: zip_code
        tests:
          - is_valid_zip

      - name: crash_date
        description: Date of the crash
        tests:
          - not_null

      - name: crash_time
        description: Time of the crash
        tests:
          - not_null

      - name: persons_injured
        tests:
          - is_between:
              arguments:
                min_value: 0
                max_value: 1000

      - name: persons_killed
        tests:
          - is_between:
              arguments:
                min_value: 0
                max_value: 1000

      - name: pedestrians_injured
        tests:
          - is_between:
              arguments:
                min_value: 0
                max_value: 1000

      - name: pedestrians_killed
        tests:
          - is_between:
              arguments:
                min_value: 0
                max_value: 1000

      - name: cyclist_injured
        tests:
          - is_between:
              arguments:
                min_value: 0
                max_value: 1000

      - name: cyclist_killed
        tests:
          - is_between:
              arguments:
                min_value: 0
                max_value: 1000

      - name: motorist_injured
        tests:
          - is_between:
              arguments:
                min_value: 0
                max_value: 1000

      - name: motorist_killed
        tests:
          - is_between:
              arguments:
                min_value: 0
                max_value: 1000

      - name: loaded_at
        description: Timestamp when the row was loaded into the raw table

      - name: _src_file
        description: Source CSV filename that produced this row

  - name: stg_persons
    description: Staged person records with typed date/time columns
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - collision_id
              - person_id
    columns:
      - name: unique_id
        description: Primary key
        tests:
          - not_null

      - name: collision_id
        description: FK to stg_crashes
        tests:
          - not_null

      - name: crash_date
        description: Date of the crash
        tests:
          - not_null

      - name: crash_time
        description: Time of the crash
        tests:
          - not_null

      - name: person_type
        tests:
          - accepted_values:
              arguments:
                values: [bicyclist, occupant, other motorized, pedestrian]

      - name: person_injury
        tests:
          - accepted_values:
              arguments:
                values: [injured, killed]

  - name: stg_vehicles
    description: Staged vehicle records with typed date/time and numeric columns
    columns:
      - name: unique_id
        description: Primary key
        tests:
          - not_null

      - name: collision_id
        description: FK to stg_crashes
        tests:
          - not_null

      - name: crash_date
        description: Date of the crash
        tests:
          - not_null

      - name: crash_time
        description: Time of the crash
        tests:
          - not_null

      - name: vehicle_year
        description: Model year of the vehicle
        tests:
          - is_between:
              arguments:
                min_value: 1900
                max_value: 2030

      - name: vehicle_occupants
        description: Number of occupants in the vehicle
        # tests:
        #   - is_between:
        #       arguments:
        #         min_value: 0
        #         max_value: 200

      - name: loaded_at
        description: Timestamp when the row was loaded into the raw table

      - name: _src_file
        description: Source CSV filename that produced this row
