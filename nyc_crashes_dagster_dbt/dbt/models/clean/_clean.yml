version: 2

models:
  - name: stg_crashes_clean
    description: Crash records that pass all data quality checks. Safe for downstream analytics consumption.
    columns:
      - name: collision_id
        description: Primary key
        tests:
          - not_null
          - unique

      - name: crash_date
        tests:
          - not_null

      - name: crash_time
        tests:
          - not_null

      - name: borough
        tests:
          - accepted_values:
              arguments:
                values: [bronx, brooklyn, manhattan, queens, staten island]

      - name: row_hash
        tests:
          - not_null

  - name: stg_persons_clean
    description: Person records that pass all data quality checks. Safe for downstream analytics consumption.
    columns:
      - name: person_type
        tests:
          - accepted_values:
              arguments:
                values: [bicyclist, occupant, other motorized, pedestrian]

      - name: person_injury
        tests:
          - accepted_values:
              arguments:
                values: [injured, killed]

  - name: stg_vehicles_clean
    description: Vehicle records that pass all data quality checks. Safe for downstream analytics consumption.
